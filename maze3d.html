<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D迷路メーカー</title>
<style>
  :root {
    --bg: #1a1d24;
    --panel: #242832;
    --accent: #4dd0e1;
    --accent2: #ffb74d;
    --wall: #ff5252;
    --text: #e6e9ef;
    --muted: #9aa3b2;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    overflow: hidden;
    height: 100%;
  }
  #editor {
    display: flex;
    height: 100vh;
    width: 100vw;
  }
  #sidebar {
    width: 280px;
    background: var(--panel);
    padding: 18px;
    overflow-y: auto;
    flex-shrink: 0;
    border-right: 1px solid #000;
  }
  h1 { font-size: 20px; margin: 0 0 4px; color: var(--accent); }
  .sub { font-size: 12px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }
  .group { margin-bottom: 18px; }
  .group-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .tools { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  button {
    background: #313643;
    color: var(--text);
    border: 1px solid #3d4350;
    border-radius: 8px;
    padding: 10px 8px;
    font-size: 13px;
    cursor: pointer;
    transition: .15s;
    font-family: inherit;
  }
  button:hover { background: #3b4250; }
  button.active { background: var(--accent); color: #06262b; border-color: var(--accent); font-weight: bold; }
  .tool-wall.active { background: var(--wall); border-color: var(--wall); color: #fff; }
  .tool-start.active { background: #66bb6a; border-color: #66bb6a; color: #06270a; }
  .tool-goal.active { background: var(--accent2); border-color: var(--accent2); color: #3a2600; }
  .full { width: 100%; }
  #playBtn {
    background: linear-gradient(135deg, var(--accent), #26a69a);
    color: #042a2b; font-weight: bold; font-size: 16px; padding: 14px;
    border: none; margin-top: 6px;
  }
  #playBtn:hover { filter: brightness(1.1); }
  .row { display: flex; gap: 8px; }
  .row button { flex: 1; }
  label.slider { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  input[type=range] { width: 100%; }
  #canvasWrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #11131a;
    position: relative;
  }
  #grid {
    background: #0c0e13;
    image-rendering: pixelated;
    cursor: crosshair;
    border: 1px solid #2a2e38;
    box-shadow: 0 0 40px rgba(0,0,0,.5);
  }
  #coord { position: absolute; bottom: 10px; right: 14px; font-size: 12px; color: var(--muted); background: rgba(0,0,0,.4); padding: 4px 8px; border-radius: 6px; }

  /* 3D view */
  #game { position: fixed; inset: 0; display: none; background: #000; }
  #game canvas { display: block; }
  #hud {
    position: absolute; top: 14px; left: 14px;
    background: rgba(20,24,32,.75); padding: 10px 14px; border-radius: 8px;
    font-size: 13px; line-height: 1.6; pointer-events: none;
  }
  #hud b { color: var(--accent); }
  #crosshair {
    position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
    margin: -3px 0 0 -3px; background: rgba(255,255,255,.7); border-radius: 50%;
    pointer-events: none;
  }
  #overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    background: rgba(8,10,15,.82); cursor: pointer;
  }
  #overlay h2 { font-size: 28px; margin: 0 0 10px; color: var(--accent); }
  #overlay p { color: var(--muted); max-width: 420px; line-height: 1.7; }
  #overlay .key { display:inline-block; background:#313643; border:1px solid #4a505c; border-radius:5px; padding:1px 7px; margin:0 2px; font-size:12px; }
  #winScreen {
    position: absolute; inset: 0; display: none; flex-direction: column;
    align-items: center; justify-content: flex-end; text-align: center;
    padding-bottom: 7vh;
    background: linear-gradient(to bottom, rgba(8,10,6,0) 35%, rgba(8,12,6,.5) 62%, rgba(6,8,4,.88) 100%);
  }
  #winScreen h2 { font-size: 42px; color: var(--accent2); margin: 0 0 6px; text-shadow: 0 0 24px rgba(255,183,77,.7), 0 2px 6px #000; }
  #winScreen p { color: #fff; font-size: 18px; text-shadow: 0 2px 6px #000; }
  #winScreen button { margin-top: 20px; background: linear-gradient(135deg,#f4d35e,#d4af37); color: #3a2600; font-weight: bold; padding: 12px 30px; border: none; font-size: 15px; border-radius: 8px; box-shadow: 0 4px 20px rgba(212,175,55,.5); }
  .timer { position: absolute; top: 14px; right: 14px; background: rgba(20,24,32,.75); padding: 8px 16px; border-radius: 8px; font-size: 18px; font-variant-numeric: tabular-nums; }
  .toast { position:absolute; bottom: 30px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.7); padding:8px 18px; border-radius:20px; font-size:13px; color:var(--muted); }
  #minimapWrap { position:absolute; bottom:14px; right:14px; background:rgba(10,13,20,.75); padding:8px; border-radius:10px; border:1px solid #2a2e38; }
  #minimap { display:block; image-rendering:pixelated; border-radius:4px; }
  #minimapWrap .cap { font-size:11px; color:var(--muted); text-align:center; margin-top:4px; }
</style>
</head>
<body>

<!-- ===== 2D EDITOR ===== -->
<div id="editor">
  <div id="sidebar">
    <h1>🧩 3D迷路メーカー</h1>
    <div class="sub">100×100マスに壁を描き、スタートとゴールを置いて「3Dで遊ぶ」を押してください。ドラッグで連続して塗れます。</div>

    <div class="group">
      <div class="group-title">ツール</div>
      <div class="tools">
        <button class="tool tool-wall active" data-tool="wall">🧱 壁</button>
        <button class="tool" data-tool="erase">🧽 消去</button>
        <button class="tool tool-start" data-tool="start">🟢 スタート</button>
        <button class="tool tool-goal" data-tool="goal">🏁 ゴール</button>
      </div>
    </div>

    <div class="group">
      <div class="group-title">編集</div>
      <div class="row" style="margin-bottom:8px;">
        <button id="borderBtn">外壁を囲む</button>
        <button id="clearBtn">全消去</button>
      </div>
      <button class="full" id="genBtn">🎲 ランダム迷路を生成</button>
    </div>

    <div class="group">
      <div class="group-title">クリア判定</div>
      <button class="full" id="checkBtn">🔍 ゴール可能か確認</button>
      <div id="checkResult" style="font-size:13px; margin-top:8px; min-height:18px; line-height:1.5;"></div>
    </div>

    <div class="group">
      <div class="group-title">ブラシサイズ</div>
      <label class="slider">太さ: <span id="brushVal">1</span></label>
      <input type="range" id="brush" min="1" max="5" value="1">
    </div>

    <div class="group">
      <div class="group-title">保存 / 読込</div>
      <div class="row">
        <button id="saveBtn">保存</button>
        <button id="loadBtn">読込</button>
      </div>
    </div>

    <button id="playBtn" class="full">▶ 3Dで遊ぶ</button>
  </div>

  <div id="canvasWrap">
    <canvas id="grid"></canvas>
    <div id="coord">-, -</div>
  </div>
</div>

<!-- ===== 3D GAME ===== -->
<div id="game">
  <div id="hud">
    移動: <b>W A S D</b> / 視点: <b>マウス・ドラッグ・矢印</b><br>
    ダッシュ: <b>Shift</b> / 戻る: <b>Esc</b>
  </div>
  <div class="timer" id="timer">00:00.0</div>
  <div id="crosshair"></div>
  <div id="minimapWrap">
    <canvas id="minimap" width="200" height="200"></canvas>
    <div class="cap">探索マップ（<b>M</b>で表示切替）</div>
  </div>
  <div id="overlay">
    <h2>クリックして開始</h2>
    <p>
      <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> で移動。<br>
      視点は <b>マウス</b>（ロックされない場合は<b>ドラッグ</b>）または <span class="key">←</span><span class="key">↑</span><span class="key">↓</span><span class="key">→</span>。<br>
      光る<b style="color:var(--accent2)">🏁ゴール</b>を目指しましょう。<br>
      <span class="key">Esc</span> でエディタに戻ります。
    </p>
  </div>
  <div id="winScreen">
    <h2>🎉 ゴール！</h2>
    <p id="winTime"></p>
    <button id="backBtn">エディタに戻る</button>
  </div>
</div>

<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
<script>
// ============================================================
//  迷路データ
// ============================================================
const N = 100;                 // グリッドサイズ
const grid = new Uint8Array(N * N);  // 0=空, 1=壁
let startCell = { x: 1, y: 1 };
let goalCell  = { x: N - 2, y: N - 2 };
const idx = (x, y) => y * N + x;

// ============================================================
//  2Dエディタ
// ============================================================
const canvas = document.getElementById('grid');
const ctx = canvas.getContext('2d');
const CELL = 6;                // 1マスのピクセル
canvas.width = N * CELL;
canvas.height = N * CELL;

let tool = 'wall';
let brush = 1;
let painting = false;
let solutionPath = null;   // BFSで見つけた経路（マスindexの配列）

function drawGrid() {
  ctx.fillStyle = '#0c0e13';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // 壁
  ctx.fillStyle = '#ff5252';
  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {
      if (grid[idx(x, y)]) ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
    }
  }
  // グリッド線（10マスごと）
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= N; i += 10) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(canvas.width, i * CELL); ctx.stroke();
  }
  // 解の経路
  if (solutionPath) {
    ctx.fillStyle = 'rgba(77,208,225,0.8)';
    for (const ci of solutionPath) {
      ctx.fillRect((ci % N) * CELL, ((ci / N) | 0) * CELL, CELL, CELL);
    }
  }
  // スタート
  ctx.fillStyle = '#66bb6a';
  ctx.fillRect(startCell.x * CELL, startCell.y * CELL, CELL, CELL);
  // ゴール
  ctx.fillStyle = '#ffb74d';
  ctx.fillRect(goalCell.x * CELL, goalCell.y * CELL, CELL, CELL);
}

function cellFromEvent(e) {
  const r = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - r.left) / r.width * N);
  const y = Math.floor((e.clientY - r.top) / r.height * N);
  return { x: Math.max(0, Math.min(N - 1, x)), y: Math.max(0, Math.min(N - 1, y)) };
}

function applyTool(cx, cy) {
  clearSolution();
  if (tool === 'start') { startCell = { x: cx, y: cy }; grid[idx(cx, cy)] = 0; drawGrid(); return; }
  if (tool === 'goal')  { goalCell  = { x: cx, y: cy }; grid[idx(cx, cy)] = 0; drawGrid(); return; }
  const v = tool === 'wall' ? 1 : 0;
  const r = brush - 1;
  for (let dy = -r; dy <= r; dy++) {
    for (let dx = -r; dx <= r; dx++) {
      const x = cx + dx, y = cy + dy;
      if (x >= 0 && x < N && y >= 0 && y < N) grid[idx(x, y)] = v;
    }
  }
  drawGrid();
}

canvas.addEventListener('mousedown', e => {
  painting = true;
  const c = cellFromEvent(e);
  applyTool(c.x, c.y);
});
canvas.addEventListener('mousemove', e => {
  const c = cellFromEvent(e);
  document.getElementById('coord').textContent = `${c.x}, ${c.y}`;
  if (painting && (tool === 'wall' || tool === 'erase')) applyTool(c.x, c.y);
});
window.addEventListener('mouseup', () => painting = false);

// ツール選択
document.querySelectorAll('.tool').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tool').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    tool = btn.dataset.tool;
  });
});

// ブラシ
const brushInput = document.getElementById('brush');
brushInput.addEventListener('input', () => {
  brush = +brushInput.value;
  document.getElementById('brushVal').textContent = brush;
});

// 編集ボタン
document.getElementById('clearBtn').onclick = () => { clearSolution(); grid.fill(0); drawGrid(); };
document.getElementById('borderBtn').onclick = () => {
  clearSolution();
  for (let i = 0; i < N; i++) {
    grid[idx(i, 0)] = 1; grid[idx(i, N - 1)] = 1;
    grid[idx(0, i)] = 1; grid[idx(N - 1, i)] = 1;
  }
  drawGrid();
};

// ランダム迷路生成（再帰的バックトラッキング）
document.getElementById('genBtn').onclick = () => {
  clearSolution();
  grid.fill(1);
  const stack = [];
  const sx = 1, sy = 1;
  grid[idx(sx, sy)] = 0;
  stack.push([sx, sy]);
  const dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]];
  while (stack.length) {
    const [x, y] = stack[stack.length - 1];
    const nb = [];
    for (const [dx, dy] of dirs) {
      const nx = x + dx, ny = y + dy;
      if (nx > 0 && nx < N - 1 && ny > 0 && ny < N - 1 && grid[idx(nx, ny)] === 1) nb.push([nx, ny, dx, dy]);
    }
    if (nb.length) {
      const [nx, ny, dx, dy] = nb[Math.floor(Math.random() * nb.length)];
      grid[idx(x + dx / 2, y + dy / 2)] = 0;
      grid[idx(nx, ny)] = 0;
      stack.push([nx, ny]);
    } else {
      stack.pop();
    }
  }
  startCell = { x: 1, y: 1 };
  grid[idx(1, 1)] = 0;
  setGoalFarthest();   // 到達可能な最遠マスをゴールに → 必ずクリア可能
  drawGrid();
};

// スタートから到達できる「最も遠いマス」をゴールに設定（必ずクリア可能になる）
function setGoalFarthest() {
  const sI = idx(startCell.x, startCell.y);
  grid[sI] = 0;
  const dist = new Int32Array(N * N).fill(-1);
  const q = new Int32Array(N * N);
  let h = 0, t = 0;
  q[t++] = sI; dist[sI] = 0;
  const dirs = [1, -1, N, -N];
  let best = sI, bestD = -1;
  while (h < t) {
    const ci = q[h++];
    const cx = ci % N;
    if (dist[ci] > bestD) { bestD = dist[ci]; best = ci; }
    for (let k = 0; k < 4; k++) {
      const ni = ci + dirs[k];
      if (ni < 0 || ni >= N * N) continue;
      if (dirs[k] === 1 && cx === N - 1) continue;
      if (dirs[k] === -1 && cx === 0) continue;
      if (dist[ni] !== -1 || grid[ni] === 1) continue;
      dist[ni] = dist[ci] + 1; q[t++] = ni;
    }
  }
  goalCell = { x: best % N, y: (best / N) | 0 };
  grid[idx(goalCell.x, goalCell.y)] = 0;
}

// ゴール到達判定（幅優先探索） → 経路(index配列) または null
function findPath() {
  const sI = idx(startCell.x, startCell.y);
  const gI = idx(goalCell.x, goalCell.y);
  if (grid[sI] === 1) return { path: null, reason: 'start' };
  if (grid[gI] === 1) return { path: null, reason: 'goal' };
  const prev = new Int32Array(N * N).fill(-1);
  const visited = new Uint8Array(N * N);
  const q = new Int32Array(N * N);
  let head = 0, tail = 0;
  q[tail++] = sI; visited[sI] = 1;
  const dirs = [1, -1, N, -N];
  let found = false;
  while (head < tail) {
    const ci = q[head++];
    if (ci === gI) { found = true; break; }
    const cx = ci % N;
    for (let k = 0; k < 4; k++) {
      const ni = ci + dirs[k];
      if (ni < 0 || ni >= N * N) continue;
      // 左右移動で行をまたがないようチェック
      if (dirs[k] === 1 && cx === N - 1) continue;
      if (dirs[k] === -1 && cx === 0) continue;
      if (visited[ni] || grid[ni] === 1) continue;
      visited[ni] = 1; prev[ni] = ci; q[tail++] = ni;
    }
  }
  if (!found) return { path: null, reason: 'blocked' };
  const path = [];
  let c = gI;
  while (c !== -1) { path.push(c); c = prev[c]; }
  return { path, reason: 'ok' };
}

// ゴール可能か確認ボタン
const checkResult = document.getElementById('checkResult');
document.getElementById('checkBtn').onclick = () => {
  const res = findPath();
  if (res.path) {
    solutionPath = res.path;
    checkResult.innerHTML = `<span style="color:#4dd0e1">✅ ゴール可能</span>　最短 ${res.path.length} マス<br><span style="color:#9aa3b2;font-size:11px">水色がルートです</span>`;
  } else {
    solutionPath = null;
    const msg = res.reason === 'start' ? 'スタートが壁の中です'
             : res.reason === 'goal'  ? 'ゴールが壁の中です'
             : '壁で塞がれていて到達できません';
    checkResult.innerHTML = `<span style="color:#ff5252">⚠ ゴール不能</span><br><span style="color:#9aa3b2;font-size:11px">${msg}</span>`;
  }
  drawGrid();
};

// 編集したら古い経路表示を消す
function clearSolution() { if (solutionPath) { solutionPath = null; checkResult.innerHTML = ''; } }

// 保存/読込（localStorage）
document.getElementById('saveBtn').onclick = () => {
  const data = { grid: Array.from(grid), start: startCell, goal: goalCell };
  localStorage.setItem('maze3d_save', JSON.stringify(data));
  showToastEditor('保存しました');
};
document.getElementById('loadBtn').onclick = () => {
  const raw = localStorage.getItem('maze3d_save');
  if (!raw) { showToastEditor('保存データがありません'); return; }
  try {
    const data = JSON.parse(raw);
    clearSolution();
    grid.set(data.grid);
    startCell = data.start; goalCell = data.goal;
    drawGrid();
    showToastEditor('読み込みました');
  } catch (e) { showToastEditor('読み込み失敗'); }
};
function showToastEditor(msg) {
  const c = document.getElementById('coord');
  c.textContent = msg;
  setTimeout(() => c.textContent = '-, -', 1200);
}

// 初期: 外壁 + ランダム迷路
document.getElementById('genBtn').onclick();

// ============================================================
//  3Dゲーム  (Three.js)
// ============================================================
const gameDiv = document.getElementById('game');
const editorDiv = document.getElementById('editor');
let renderer, scene, camera, animId;
let goalMesh, goalLight, playerLight;
let statueGems = null;       // 像の宝石（点滅アニメ用）
let winStartT = 0;
const WALL_H = 4;       // 壁の高さ
const TILE = 4;         // 1マスのワールドサイズ
const PR = 1.1;         // プレイヤー半径(衝突)
const player = { x: 0, z: 0, yaw: 0, pitch: 0, vx: 0, vz: 0 };
const keys = {};
let running = false;
let startTime = 0, won = false;

// 探索マップ（フォグ・オブ・ウォー）
const seenMap = new Uint8Array(N * N);     // 視界に入った/通ったマス
const visitedMap = new Uint8Array(N * N);  // 実際に通った足跡
const mm = document.getElementById('minimap');
const mmCtx = mm.getContext('2d');
const mmCell = mm.width / N;               // ミニマップ1マスのpx
let mmFrame = 0;
let mapVisible = true;

function isWall(gx, gy) {
  if (gx < 0 || gx >= N || gy < 0 || gy >= N) return true;
  return grid[idx(gx, gy)] === 1;
}

// ---- エジプト風 壁画テクスチャを手続き生成 ----
let muralTextures = null;
let rareTextures = null;
let rareMaterials = [];           // レア壁のマテリアル（点滅アニメ用）
const RARE_P = 0.008;             // レア図像の出現確率(約0.8%＝かなり希少)

// 通常のエジプト壁画パレット（砂岩・ラピス青・金・赤・ターコイズ）
function getMuralTextures() {
  if (muralTextures) return muralTextures;
  const palettes = [
    { bg: '#dcc79a', line: '#241308', a: '#b5341f', b: '#1d5fa8', c: '#d9a441' }, // 砂岩×赤青金
    { bg: '#d3bd8e', line: '#1d1006', a: '#1d5fa8', b: '#1f9e8f', c: '#e0b84a' }, // ラピス×ターコイズ
    { bg: '#cbb784', line: '#20120a', a: '#1f9e8f', b: '#b5341f', c: '#d9a441' }, // ターコイズ×赤
    { bg: '#e0cda2', line: '#2b1a12', a: '#b5341f', b: '#1d5fa8', c: '#cfae57' }, // 明るい石灰岩
  ];
  muralTextures = palettes.map(makeEgypt);
  return muralTextures;
}
function makeEgypt(p) {
  const s = 256;
  const cv = document.createElement('canvas'); cv.width = cv.height = s;
  const g = cv.getContext('2d');
  g.fillStyle = p.bg; g.fillRect(0, 0, s, s);
  stucco(g, s);
  // 上下のヒエログリフ風装飾帯
  drawFrieze(g, s, 12, p);
  drawFrieze(g, s, s - 28, p);
  // 枠
  g.strokeStyle = p.line; g.lineWidth = 5;
  g.strokeRect(26, 38, s - 52, s - 78);
  // 中央モチーフ
  const cx = s / 2, cy = s / 2 + 2;
  const motif = Math.floor(Math.random() * 5);
  if (motif === 0) drawEyeOfHorus(g, cx, cy, p);
  else if (motif === 1) drawAnkh(g, cx, cy, p);
  else if (motif === 2) drawScarab(g, cx, cy, p);
  else if (motif === 3) drawPharaohProfile(g, cx, cy, p);
  else drawSunRa(g, cx, cy, p);
  // 縦のヒエログリフ列（左右）
  drawGlyphColumn(g, 40, 54, s - 108, p);
  drawGlyphColumn(g, s - 48, 54, s - 108, p);

}

// ---- レア・プレミアム図像（黄金の財宝。3Dで自己発光する）----
function getRareTextures() {

  return rareTextures;
}
function makeRare(variant) {
  const s = 256;
  const cv = document.createElement('canvas'); cv.width = cv.height = s;
  const g = cv.getContext('2d');
  // 黒曜石の下地（中央が明るい放射グラデ）
  const rg = g.createRadialGradient(s / 2, s / 2, 8, s / 2, s / 2, 165);
  rg.addColorStop(0, '#4a3410'); rg.addColorStop(0.5, '#1d150b'); rg.addColorStop(1, '#0c0905');
  g.fillStyle = rg; g.fillRect(0, 0, s, s);
  // 黄金の放射光
  g.save(); g.translate(s / 2, s / 2);
  for (let i = 0; i < 36; i++) {
    g.rotate(Math.PI * 2 / 36);
    g.strokeStyle = i % 2 ? 'rgba(246,207,92,0.55)' : 'rgba(246,207,92,0.18)';
    g.lineWidth = i % 2 ? 3 : 6;
    g.beginPath(); g.moveTo(0, 36); g.lineTo(0, 120); g.stroke();
  }
  g.restore();
  // 二重の黄金枠＋グレカ
  g.strokeStyle = '#f6cf5c'; g.lineWidth = 8; g.strokeRect(10, 10, s - 20, s - 20);
  g.strokeStyle = '#c9962f'; g.lineWidth = 2; g.strokeRect(20, 20, s - 40, s - 40);
  drawGreca(g, s, 14, '#f6cf5c');
  drawGreca(g, s, s - 26, '#f6cf5c');
  // 中央の財宝
  const cx = s / 2, cy = s / 2;
  if (variant === 0) rareTutMask(g, cx, cy);
  else if (variant === 1) rareGoldAnkh(g, cx, cy);
  else rareGoldScarab(g, cx, cy);
  // 四隅の宝石象嵌
  for (const [ox, oy] of [[30, 30], [s - 30, 30], [30, s - 30], [s - 30, s - 30]]) gem(g, ox, oy, 7, '#27c0c8');
  return mkTex(cv);
}

}

  // ── 後光（黄金のハロー）──
  add(new THREE.TorusGeometry(0.6, 0.05, 10, 32), goldT, 0, 4.5, -0.18);

  // ── 王冠：金の冠帯＋ウラエウス＋羽根冠（アテフ）＋太陽円盤 ──
  add(new THREE.TorusGeometry(0.36, 0.05, 8, 24), goldT, 0, 4.78, 0, Math.PI / 2, 0, 0); // 冠帯
  add(new THREE.ConeGeometry(0.09, 0.26, 6), goldT, 0, 4.86, 0.32, 0.4, 0, 0);            // ウラエウス
  addGem(0, 4.96, 0.3, gemMat.red, 0.06);
  for (const sx of [-1, 1]) {                                                              // 双羽根
    add(new THREE.BoxGeometry(0.14, 0.78, 0.4), white, sx * 0.2, 5.2, -0.02, 0, 0, sx * 0.12);
    add(new THREE.BoxGeometry(0.16, 0.1, 0.42), goldT, sx * 0.24, 5.58, -0.02, 0, 0, sx * 0.12); // 羽根の金縁
  }
  add(new THREE.SphereGeometry(0.16, 16, 12), goldT, 0, 5.18, 0);                          // 太陽円盤
  addGem(0, 5.18, 0.16, gemMat.red, 0.06);

  grp.scale.setScalar(0.68);   // 天井(高さ4)に収まるよう縮小
  statueGems = gems;
  return grp;
}

function buildScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x2a2018);
  scene.fog = new THREE.Fog(0x2a2018, TILE * 5, TILE * 26);

  camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 500);

  // ライト（暖かく明るめ）
  scene.add(new THREE.AmbientLight(0xffe9c8, 0.95));
  const hemi = new THREE.HemisphereLight(0xfff0d6, 0x4a3a2a, 0.9);
  scene.add(hemi);

  // 床（暖色の石畳）
  const floorGeo = new THREE.PlaneGeometry(N * TILE, N * TILE);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x6b5d44, roughness: 1 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.set(N * TILE / 2, 0, N * TILE / 2);
  scene.add(floor);

  // 天井
  const ceil = new THREE.Mesh(floorGeo, new THREE.MeshStandardMaterial({ color: 0x33291f, roughness: 1, side: THREE.DoubleSide }));
  ceil.rotation.x = Math.PI / 2;
  ceil.position.set(N * TILE / 2, WALL_H, N * TILE / 2);
  scene.add(ceil);

  // プレイヤーの松明（足元を暖かく照らす）
  playerLight = new THREE.PointLight(0xffe2b0, 1.25, TILE * 10, 1.8);
  scene.add(playerLight);

  // 壁（エジプト壁画を貼り分け＋ごく低確率でレアの黄金財宝）
  const commonTexs = getMuralTextures();
  const rareTexs = getRareTextures();
  const C = commonTexs.length;
  const wallGeo = new THREE.BoxGeometry(TILE, WALL_H, TILE);
  // デザインごとのマテリアル（レアは自己発光してプレミアム感を出す）
  const designs = [];
  commonTexs.forEach(tx => designs.push({ mat: new THREE.MeshStandardMaterial({ map: tx, roughness: 0.92, metalness: 0.04 }), rare: false }));
  rareTexs.forEach(tx => designs.push({
    mat: new THREE.MeshStandardMaterial({ map: tx, emissive: 0xffffff, emissiveMap: tx, emissiveIntensity: 0.6, roughness: 0.45, metalness: 0.4 }),
    rare: true
  }));
  rareMaterials = designs.filter(d => d.rare).map(d => d.mat);
  // 壁を各デザインに割り当て（座標を貯めてからInstancedMesh生成）
  const buckets = designs.map(() => []);
  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {
      if (!grid[idx(x, y)]) continue;
      let di;
      if (Math.random() < RARE_P) di = C + (Math.random() * rareTexs.length | 0);
      else di = (x * 7 + y * 13) % C;
      buckets[di].push(x, y);
    }
  }
  const m = new THREE.Matrix4();
  const color = new THREE.Color();
  designs.forEach((d, di) => {
    const coords = buckets[di];
    const cnt = coords.length / 2;
    if (cnt === 0) return;
    const inst = new THREE.InstancedMesh(wallGeo, d.mat, cnt);
    for (let k = 0; k < cnt; k++) {
      const x = coords[k * 2], y = coords[k * 2 + 1];
      m.setPosition(x * TILE + TILE / 2, WALL_H / 2, y * TILE + TILE / 2);
      inst.setMatrixAt(k, m);
      if (d.rare) {
        color.setRGB(1, 1, 1);                       // レアはテクスチャをそのまま鮮明に
      } else {
        const t = 0.9 + Math.random() * 0.18;        // 通常壁は明るめの色ムラ
        color.setRGB(t, t * 0.97, t * 0.9);
      }
      inst.setColorAt(k, color);
    }
    inst.instanceMatrix.needsUpdate = true;
    if (inst.instanceColor) inst.instanceColor.needsUpdate = true;
    scene.add(inst);
  });

  // ゴール（立体のファラオ像）
  goalMesh = buildPharaohStatue();
  goalMesh.position.set(goalCell.x * TILE + TILE / 2, 0, goalCell.y * TILE + TILE / 2);
  // プレイ中は静止し、スタート方向を向く（回転はゴール後のみ）
  goalMesh.rotation.y = Math.atan2(startCell.x - goalCell.x, startCell.y - goalCell.y);
  scene.add(goalMesh);
  goalLight = new THREE.PointLight(0xffd27a, 2.6, TILE * 13, 1.4);
  goalLight.position.set(goalMesh.position.x, WALL_H * 0.95, goalMesh.position.z);
  scene.add(goalLight);

  // 探索マップをリセット
  seenMap.fill(0);
  visitedMap.fill(0);

  // プレイヤー位置（マス中心）
  player.x = startCell.x * TILE + TILE / 2;
  player.z = startCell.y * TILE + TILE / 2;
  player.yaw = 0; player.pitch = 0;

  // ゴール方向を向く
  const dx = goalMesh.position.x - player.x;
  const dz = goalMesh.position.z - player.z;
  player.yaw = Math.atan2(-dx, -dz);
}

function setupRenderer() {
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  gameDiv.insertBefore(renderer.domElement, gameDiv.firstChild);
}

// 衝突判定付き移動
function tryMove(nx, nz) {
  // X方向
  let gx = Math.floor(nx / TILE);
  let gz = Math.floor(player.z / TILE);
  if (!collides(nx, player.z)) player.x = nx;
  if (!collides(player.x, nz)) player.z = nz;
}
function collides(px, pz) {
  // プレイヤー円(半径PR)が壁マスと交差するか
  const minx = Math.floor((px - PR) / TILE);
  const maxx = Math.floor((px + PR) / TILE);
  const minz = Math.floor((pz - PR) / TILE);
  const maxz = Math.floor((pz + PR) / TILE);
  for (let gy = minz; gy <= maxz; gy++) {
    for (let gx = minx; gx <= maxx; gx++) {
      if (isWall(gx, gy)) {
        // セルの矩形に最近接点
        const cx = Math.max(gx * TILE, Math.min(px, gx * TILE + TILE));
        const cz = Math.max(gy * TILE, Math.min(pz, gy * TILE + TILE));
        const ddx = px - cx, ddz = pz - cz;
        if (ddx * ddx + ddz * ddz < PR * PR) return true;
      }
    }
  }
  return false;
}

// 視界＋足元を地図に反映
function revealView() {
  const px = player.x, pz = player.z;
  const pgx = Math.floor(px / TILE), pgz = Math.floor(pz / TILE);
  // 足元の周囲（近接は壁の有無に関わらず見える）
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const gx = pgx + dx, gz = pgz + dy;
      if (gx >= 0 && gx < N && gz >= 0 && gz < N) seenMap[idx(gx, gz)] = 1;
    }
  }
  if (pgx >= 0 && pgx < N && pgz >= 0 && pgz < N) visitedMap[idx(pgx, pgz)] = 1;

  // 視界レイ（前方を扇状に飛ばし、壁で遮蔽されるまでを可視化）
  const RAYS = 70;
  const MAXD = 16 * TILE;     // 見通し距離
  const STEP = TILE * 0.35;
  const HALF_FOV = 0.62;      // 視野角の半分(約36°)
  for (let r = 0; r < RAYS; r++) {
    const a = player.yaw + (r / (RAYS - 1) - 0.5) * 2 * HALF_FOV;
    const dx = -Math.sin(a), dz = -Math.cos(a);
    for (let d = STEP; d < MAXD; d += STEP) {
      const gx = Math.floor((px + dx * d) / TILE);
      const gz = Math.floor((pz + dz * d) / TILE);
      if (gx < 0 || gx >= N || gz < 0 || gz >= N) break;
      seenMap[idx(gx, gz)] = 1;      // 壁マスも見えたら記録
      if (grid[idx(gx, gz)] === 1) break;  // 壁で遮られる
    }
  }
}

// ミニマップ描画
function drawMinimap() {
  const c = mmCtx, s = mmCell;
  c.fillStyle = '#05070b';
  c.fillRect(0, 0, mm.width, mm.height);
  // 発見済みマス
  for (let i = 0; i < seenMap.length; i++) {
    if (!seenMap[i]) continue;
    c.fillStyle = grid[i] ? '#5a6a88' : '#1b212e';   // 壁 / 通路
    c.fillRect((i % N) * s, ((i / N) | 0) * s, Math.ceil(s), Math.ceil(s));
  }
  // 足跡
  c.fillStyle = 'rgba(77,208,225,0.45)';
  for (let i = 0; i < visitedMap.length; i++) {
    if (visitedMap[i]) c.fillRect((i % N) * s, ((i / N) | 0) * s, Math.ceil(s), Math.ceil(s));
  }
  const mk = Math.max(3, s * 2.2);
  // スタート
  c.fillStyle = '#66bb6a';
  c.fillRect(startCell.x * s - mk / 2, startCell.y * s - mk / 2, mk, mk);
  // ゴール（常に表示。未発見でも位置がわかるように光らせる）
  const gpx = goalCell.x * s, gpy = goalCell.y * s;
  c.save();
  c.shadowColor = '#ffb74d';
  c.shadowBlur = 6;
  c.fillStyle = '#ffb74d';
  c.fillRect(gpx - mk / 2, gpy - mk / 2, mk, mk);
  c.restore();
  // 🏁マーク（少し上に）
  c.fillStyle = '#fff';
  c.font = `${Math.max(8, mk * 1.6)}px sans-serif`;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText('★', gpx, gpy);
  // プレイヤー（向き付き三角）
  c.save();
  c.translate((player.x / TILE) * s, (player.z / TILE) * s);
  c.rotate(-player.yaw);
  c.fillStyle = '#ffffff';
  c.beginPath();
  c.moveTo(0, -5); c.lineTo(3.5, 4); c.lineTo(-3.5, 4); c.closePath();
  c.fill();
  c.restore();
}

let lastT = 0;
function loop(t) {
  animId = requestAnimationFrame(loop);
  const dt = Math.min(0.05, (t - lastT) / 1000 || 0);
  lastT = t;

  if (running && !won) {
    // 矢印キーで視点（マウスが使えない環境のフォールバック）
    if (keys['arrowleft'])  player.yaw   += 2.0 * dt;
    if (keys['arrowright']) player.yaw   -= 2.0 * dt;
    if (keys['arrowup'])    player.pitch = Math.min(Math.PI / 2 - 0.05, player.pitch + 1.3 * dt);
    if (keys['arrowdown'])  player.pitch = Math.max(-(Math.PI / 2 - 0.05), player.pitch - 1.3 * dt);

    const speed = (keys['shift'] ? 14 : 7);
    let fx = 0, fz = 0;
    const sin = Math.sin(player.yaw), cos = Math.cos(player.yaw);
    // 前方ベクトル: (-sin, -cos)
    if (keys['w']) { fx += -sin; fz += -cos; }
    if (keys['s']) { fx +=  sin; fz +=  cos; }
    if (keys['a']) { fx += -cos; fz +=  sin; }
    if (keys['d']) { fx +=  cos; fz += -sin; }
    const len = Math.hypot(fx, fz);
    if (len > 0) {
      fx = fx / len * speed * dt;
      fz = fz / len * speed * dt;
      tryMove(player.x + fx, player.z + fz);
    }

    // ゴール判定
    const gdx = player.x - goalMesh.position.x;
    const gdz = player.z - goalMesh.position.z;
    if (gdx * gdx + gdz * gdz < (TILE * 0.8) * (TILE * 0.8)) winGame();

    // 探索マップ更新（毎フレーム視界を反映、描画は間引き）
    revealView();
    if (mapVisible && (mmFrame++ % 4 === 0)) drawMinimap();

    // タイマー
    const el = (performance.now() - startTime) / 1000;
    document.getElementById('timer').textContent = fmtTime(el);
  }

  // カメラ更新
  camera.position.set(player.x, WALL_H * 0.55, player.z);
  if (playerLight) playerLight.position.set(player.x, WALL_H * 0.7, player.z);
  const dir = new THREE.Vector3(
    -Math.sin(player.yaw) * Math.cos(player.pitch),
    Math.sin(player.pitch),
    -Math.cos(player.yaw) * Math.cos(player.pitch)
  );
  camera.lookAt(camera.position.x + dir.x, camera.position.y + dir.y, camera.position.z + dir.z);

  // ゴールのアニメ（回転はゴール後のみ。到達後は像を華やかに照らす）
  if (goalMesh) {
    if (won) {
      goalMesh.rotation.y += dt * 1.1;                         // ゴール後に回転
      goalLight.intensity = 4.2 + Math.sin(t / 120) * 1.2;     // きらめきUP
    } else {
      goalLight.intensity = 2.4 + Math.sin(t / 300) * 0.8;
    }
    if (statueGems) { const e = 1.1 + Math.sin(t / 180) * 0.5; for (const g of statueGems) g.material.emissiveIntensity = e; }
  }

  // レア壁画のきらめき（発光強度を脈動）
  if (rareMaterials.length) {
    const e = 0.7 + Math.sin(t / 260) * 0.3;
    for (const mat of rareMaterials) mat.emissiveIntensity = e;
  }

  renderer.render(scene, camera);
}

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  const d = Math.floor((s * 10) % 10);
  return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}.${d}`;
}

function winGame() {
  won = true;
  winStartT = performance.now();
  document.exitPointerLock();
  // 像のショーケースのためHUDを片付ける
  document.getElementById('crosshair').style.display = 'none';
  document.getElementById('minimapWrap').style.display = 'none';
  // 像の正面がプレイヤーを向くように初期角度を合わせてから回転開始
  if (goalMesh) goalMesh.rotation.y = Math.atan2(player.x - goalMesh.position.x, player.z - goalMesh.position.z);
  const el = (performance.now() - startTime) / 1000;
  document.getElementById('winTime').textContent = `タイム: ${fmtTime(el)}`;
  setTimeout(() => document.getElementById('winScreen').style.display = 'flex', 900); // 少し見せてからパネル表示
}

// ============================================================
//  画面遷移
// ============================================================
function startGame() {
  if (typeof THREE === 'undefined') {
    alert('Three.jsの読み込みに失敗しました。インターネット接続を確認して、ページを再読み込みしてください。');
    return;
  }
  // 開始前にゴール到達可能かチェック
  const res = findPath();
  if (!res.path) {
    const msg = res.reason === 'start' ? 'スタートが壁の中にあります。'
             : res.reason === 'goal'  ? 'ゴールが壁の中にあります。'
             : 'この迷路はスタートからゴールへ到達できません。';
    if (!confirm(`⚠ ${msg}\n\nこのまま3Dで開始しますか？\n（「キャンセル」でエディタに戻って修正できます）`)) {
      document.getElementById('checkBtn').onclick();  // 不能箇所を表示
      return;
    }
  }

  // スタート/ゴールが壁でないか確認
  grid[idx(startCell.x, startCell.y)] = 0;
  grid[idx(goalCell.x, goalCell.y)] = 0;

  editorDiv.style.display = 'none';
  gameDiv.style.display = 'block';
  document.getElementById('winScreen').style.display = 'none';
  won = false;

  setupRenderer();
  buildScene();
  mapVisible = true;
  document.getElementById('minimapWrap').style.display = 'block';
  document.getElementById('crosshair').style.display = 'block';
  drawMinimap();   // 初期表示（スタート地点）
  document.getElementById('overlay').style.display = 'flex';
  startTime = 0;
  document.getElementById('timer').textContent = '00:00.0';
  lastT = performance.now();
  loop(lastT);
}

function exitGame() {
  cancelAnimationFrame(animId);
  running = false;
  if (renderer) {
    renderer.domElement.remove();
    renderer.dispose();
    renderer = null;
  }
  if (scene) {
    scene.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) { Array.isArray(o.material) ? o.material.forEach(m => m.dispose()) : o.material.dispose(); }
    });
  }
  gameDiv.style.display = 'none';
  editorDiv.style.display = 'flex';
  drawGrid();
}

document.getElementById('playBtn').onclick = startGame;
document.getElementById('backBtn').onclick = exitGame;

// オーバーレイ → ゲーム開始（ポインタロックに依存しない）
let pointerLocked = false;
let dragging = false, lastMX = 0, lastMY = 0;

function beginPlay() {
  document.getElementById('overlay').style.display = 'none';
  running = true;
  if (startTime === 0) startTime = performance.now();
  // ポインタロックは「できれば使う」程度。失敗しても無視
  try {
    const p = renderer.domElement.requestPointerLock && renderer.domElement.requestPointerLock();
    if (p && p.catch) p.catch(() => {});
  } catch (e) { /* iframe等で不可。ドラッグ操作にフォールバック */ }
}
document.getElementById('overlay').addEventListener('click', beginPlay);

document.addEventListener('pointerlockchange', () => {
  pointerLocked = (document.pointerLockElement === renderer?.domElement);
});

function applyLook(dx, dy) {
  player.yaw   -= dx * 0.0024;
  player.pitch -= dy * 0.0024;
  const lim = Math.PI / 2 - 0.05;
  player.pitch = Math.max(-lim, Math.min(lim, player.pitch));
}

// ポインタロック中はmovement、未ロック時はドラッグで視点
document.addEventListener('mousemove', e => {
  if (!running) return;
  if (pointerLocked) {
    applyLook(e.movementX, e.movementY);
  } else if (dragging) {
    applyLook(e.clientX - lastMX, e.clientY - lastMY);
    lastMX = e.clientX; lastMY = e.clientY;
  }
});
// ドラッグ視点（ポインタロックが使えない環境用）
gameDiv.addEventListener('mousedown', e => {
  if (!running || pointerLocked) return;
  dragging = true; lastMX = e.clientX; lastMY = e.clientY;
});
window.addEventListener('mouseup', () => dragging = false);

// キー入力
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (gameDiv.style.display === 'block' && e.key.startsWith('Arrow')) e.preventDefault();
  if (e.key === 'Escape' && gameDiv.style.display === 'block') exitGame();
  if (e.key.toLowerCase() === 'm' && gameDiv.style.display === 'block') {
    mapVisible = !mapVisible;
    document.getElementById('minimapWrap').style.display = mapVisible ? 'block' : 'none';
  }
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// リサイズ
window.addEventListener('resize', () => {
  if (!renderer) return;
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// 初回描画
drawGrid();
// タイマー初期化用
startTime = 0;
</script>
